services:
  - type: web
    name: candidate-management-system
    runtime: node
    plan: free
    autoDeploy: true

    rootDir: backend

    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        sync: false